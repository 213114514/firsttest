<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebForUbuntu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🤖 213:</h1>
        <p>点击按钮开始游戏</p>
        <div class="status">● 等待点击按钮</div>
        <button class="btn" id="showImageBtn">📷 显示图片</button>
        <div class="progress-container hidden" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="image-box hidden" id="imageBox">
            <img src="nailong.jpg" alt="nailong">
        </div>
    </div>
    <script>
        var isLoaded = false;
        document.getElementById('showImageBtn').addEventListener('click', function() {
            var btn = this;
            var progressContainer = document.getElementById('progressContainer');
            var progressBar = document.getElementById('progressBar');
            var imageBox = document.getElementById('imageBox');
            
            if (!isLoaded) {
                btn.disabled = true;
                btn.textContent = '⏳ 加载中...';
                
                progressContainer.classList.remove('hidden');
                imageBox.classList.add('hidden');
                
                setTimeout(function() {
                    progressBar.classList.add('completed');
                }, 10);
                
                progressBar.addEventListener('transitionend', function showImage() {
                    progressContainer.classList.add('hidden');
                    imageBox.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = '🔽 隐藏图片';
                    progressBar.classList.remove('completed');
                    progressBar.removeEventListener('transitionend', showImage);
                    isLoaded = true;
                });
            } else {
                if (imageBox.classList.contains('hidden')) {
                    imageBox.classList.remove('hidden');
                    btn.textContent = '🔽 隐藏图片';
                } else {
                    imageBox.classList.add('hidden');
                    btn.textContent = '📷 显示图片';
                }
            }
        });
    </script>
</body>
</html>
